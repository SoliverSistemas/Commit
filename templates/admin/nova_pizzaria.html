<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Nova Pizzaria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/nova_pizzaria.css') }}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <h2>Painel</h2>
            <nav>
                <a href="/admin">Pizzarias</a>
                <a href="/admin/categorias-globais">Categorias Globais</a>
                <a href="/admin/paletas">Paletas</a>
                <a href="/admin/pizzaria/nova" class="active">Nova Pizzaria</a>
                <a href="/admin/logout">Sair</a>
            </nav>
        </aside>
        <main class="main">
            <div class="header">
                <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div>
                    <h1>Nova Pizzaria</h1>
                    <span>Crie uma nova pizzaria no sistema</span>
                </div>
            </div>
            <form class="form" id="newStoreForm">
                <div class="card">
                    <h3>Informações básicas</h3>
                    <div class="form-group">
                        <label>Nome da pizzaria</label>
                        <input type="text" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label>Slug (link)</label>
                        <input type="text" name="slug" placeholder="ex: pizzaria-do-joao" required>
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="text" name="whatsapp" placeholder="5511999999999" required>
                    </div>
                </div>
                <div class="card">
                    <h3>Personalização</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Cor fundo principal</label>
                            <input type="color" name="cor_fundo_principal" value="#0b0f1a">
                        </div>
                        <div class="form-group">
                            <label>Cor fundo secundário</label>
                            <input type="color" name="cor_fundo_secundario" value="#111827">
                        </div>
                        <div class="form-group">
                            <label>Cor dos títulos</label>
                            <input type="color" name="cor_titulos" value="#f9fafb">
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h3>Mídia</h3>
                    <div class="form-group">
                        <label>URL da logo</label>
                        <input type="text" name="logo_url" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>URL do banner</label>
                        <input type="text" name="banner_url" placeholder="https://...">
                    </div>
                </div>
                <div class="actions">
                    <button type="submit" class="btn-primary">
                        Criar pizzaria
                    </button>
                </div>
            </form>
        </main>
    </div>
    <script>
        document.getElementById("newStoreForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const payload = Object.fromEntries(formData.entries());
            payload.cor_texto = "#e5e7eb";
            payload.cor_texto_secundario = "#94a3b8";
            payload.endereco = "";
            payload.tempo_entrega_min = 30;
            payload.tempo_entrega_max = 50;
            payload.horario_abertura = "18:00";
            payload.horario_fechamento = "23:00";
            payload.status_override = "auto";
            const res = await fetch("/admin/api/pizzarias", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!res.ok) return alert("Erro ao criar pizzaria");
            window.location.href = "/admin";
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // Fechar menu ao clicar fora
        document.addEventListener('click', function (event) {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('mobileMenuBtn');
            if (!sidebar.contains(event.target) && !menuBtn.contains(event.target)) {
                sidebar.classList.remove('open');
            }
        });
    </script>
</body>

</html>
